<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBMC D-Bus Sensor Data Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="modules/airflow/airflow.css">
    <link rel="stylesheet" href="modules/temperature/temperature.css">
    <link rel="stylesheet" href="modules/power/power.css">
    <link rel="stylesheet" href="modules/voltage/voltage.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>OpenBMC D-Bus Sensor Data Dashboard</h1>
                <p class="subtitle">114_2 平行與分散式系統:程式設計與管理期末專案</p>
                <p class="subtitle">NQ6144060 林芷翊、NQ6144086 洪翊芯</p>
            </div>
        </header>

        <main class="main-content">
            <div id="homeView" class="view active">
                <section class="sensor-categories">
                    <h2>感測器類別</h2>
                    <div class="category-grid">
                        <button class="category-btn" data-category="Temperature">
                            <div class="icon">🌡️</div>
                            <div class="label">Temperature</div>
                            <div class="count">溫度</div>
                        </button>
                        <button class="category-btn" data-category="Airflow">
                            <div class="icon">💨</div>
                            <div class="label">Airflow</div>
                            <div class="count">風量</div>
                        </button>
                        <button class="category-btn" data-category="Power">
                            <div class="icon">🔌</div>
                            <div class="label">Power</div>
                            <div class="count">功率</div>
                        </button>
                        <button class="category-btn" data-category="Voltage">
                            <div class="icon">🔋</div>
                            <div class="label">Voltage</div>
                            <div class="count">電壓</div>
                        </button>
                    </div>
                </section>

                <section class="statistics">
                    <h2>感測器統計</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="totalSensors">-</div>
                            <div class="stat-label">感測器總數</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="activeSensors">-</div>
                            <div class="stat-label">正常運作</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="lastUpdate">-</div>
                            <div class="stat-label">Current Taipei Time</div>
                        </div>
                    </div>
                </section>

                <section class="rca-section" id="rootCauseSection">
                    <h2>Rule-based Root Cause Analysis</h2>
                    <div id="rootCausePanel" class="root-cause-panel"></div>
                </section>
            </div>

            <div id="categoryView" class="view">
                <div class="category-header">
                    <button class="back-btn" id="backBtn">返回</button>
                    <h2 id="categoryTitle">感測器類別</h2>
                    <div class="spacer"></div>
                </div>
                <div class="sensor-list" id="sensorList"></div>
            </div>

            <div id="temperatureBaselineView" class="view">
                <div id="temperatureModuleMount"></div>
            </div>
        </main>

        <div id="warningToast" class="warning-toast">
            <span id="warningMessage">temperature/MGNT_TEMP_C exceeds temperature baseline threshold</span>
        </div>

        <footer class="footer">
            <p>114_2 平行與分散式系統:程式設計與管理期末專案</p>
        </footer>
    </div>

    <script src="modules/airflow/airflow.js"></script>
    <script src="modules/temperature/temperature.js"></script>
    <script src="modules/power/power.js"></script>
    <script src="modules/voltage/voltage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
